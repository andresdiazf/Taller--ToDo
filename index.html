<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link  rel="stylesheet" href="styles.css">
    <title>Task Manager</title>
</head>

<body>
    <div id="app" style="display:flex; flex-direction:column; gap:16px;">
        <h1>Task Manager</h1><br>

        <div id="contador">
            Tareas Finalizadas: <span id="tareasCompletas">0</span> <br>
            Tareas Totales: <span id="tareasTotales">0</span>
        </div>

        <div id="formulario" style="display:flex; flex-direction:column; gap:8px;">
            <input type="text" id="escribirTarea" placeholder="Escribe una tarea">

            <select id="categoriaTarea">
                <option value="">-- seleccionar --</option>
                <option value="trabajo">💼&nbsp;&nbsp; Trabajo</option>
                <option value="estudio">📚&nbsp;&nbsp; Estudio</option>
                <option value="personal">👤&nbsp;&nbsp; Personal</option>
                <option value="urgente">⚠️&nbsp;&nbsp; Urgente</option>
                <option value="otrasTareas">📋&nbsp;&nbsp; Otras Tareas</option>
            </select>
            <button id="bntAgregarTarea">Agregar Tarea</button>
        </div>
        <ul id="listaTareas" style="list-style:none; padding:0;"></ul>

    </div>    
    <script src="app.js"></script>
</body>
</html>
